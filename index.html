<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艾宾浩斯记忆卡片</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .nav-tabs {
            display: flex; justify-content: center; gap: 10px;
            margin-bottom: 30px; flex-wrap: wrap;
        }
        .nav-tab {
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            color: white; border: none; border-radius: 25px;
            cursor: pointer; font-size: 1rem;
            transition: all 0.3s;
        }
        .nav-tab:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
        .nav-tab.active { background: white; color: #667eea; }
        .section { display: none; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            background: white; border-radius: 16px;
            padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 1rem;
            transition: all 0.3s; display: inline-flex;
            align-items: center; gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .memory-card {
            background: white; border-radius: 16px;
            padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s; cursor: pointer;
            position: relative; overflow: hidden;
        }
        .memory-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        .memory-card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .memory-card h3 { color: #333; margin-bottom: 10px; font-size: 1.2rem; }
        .memory-card .keywords { color: #666; font-size: 0.9rem; margin-bottom: 10px; }
        .memory-card .next-review {
            font-size: 0.8rem; color: #999;
            padding-top: 10px; border-top: 1px solid #eee;
        }
        .card-actions { display: flex; gap: 10px; margin-top: 15px; }
        .card-actions button { padding: 6px 12px; font-size: 0.85rem; }
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
            justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white; border-radius: 20px;
            padding: 30px; width: 90%; max-width: 600px;
            max-height: 90vh; overflow-y: auto;
            animation: modalIn 0.3s;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px;
        }
        .modal-header h2 { color: #333; }
        .close-btn {
            background: none; border: none; font-size: 1.5rem;
            cursor: pointer; color: #999; transition: color 0.3s;
        }
        .close-btn:hover { color: #333; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; margin-bottom: 8px;
            color: #555; font-weight: 500;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px;
            border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 1rem; transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none; border-color: #667eea;
        }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .form-group select { background: white; cursor: pointer; }
        .plan-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px;
            flex-wrap: wrap; gap: 10px;
        }
        .plan-stats { display: flex; gap: 20px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #667eea; }
        .stat-label { color: #999; font-size: 0.9rem; }
        .progress-bar {
            width: 100%; height: 10px;
            background: #e0e0e0; border-radius: 5px;
            overflow: hidden; margin-bottom: 20px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            transition: width 0.5s;
        }
        .study-card {
            background: white; border-radius: 20px;
            padding: 40px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            min-height: 400px; display: flex;
            flex-direction: column; justify-content: center;
        }
        .study-card-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .study-card h2 { font-size: 1.8rem; color: #333; margin-bottom: 20px; }
        .study-card .keywords { font-size: 1.2rem; color: #667eea; margin-bottom: 30px; }
        .study-card .detail {
            font-size: 1.1rem; color: #555; line-height: 1.8;
            padding: 20px; background: #f8f9fa;
            border-radius: 12px; margin-top: 20px; display: none;
        }
        .study-card .detail.show { display: block; animation: fadeIn 0.3s; }
        .reveal-btn { padding: 15px 40px; font-size: 1.1rem; margin: 20px 0; }
        .study-actions {
            display: flex; justify-content: center;
            gap: 20px; margin-top: 30px;
        }
        .study-actions button { padding: 15px 40px; font-size: 1.1rem; }
        .completion-message {
            text-align: center; padding: 60px 40px;
            background: white; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .completion-message h2 { font-size: 2.5rem; color: #11998e; margin-bottom: 20px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state-icon { font-size: 4rem; margin-bottom: 20px; }
        .ebbinghaus-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 20px; border-radius: 16px;
            margin-bottom: 20px;
        }
        .ebbinghaus-info h3 { margin-bottom: 10px; }
        .schedule-list { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .schedule-item {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px; border-radius: 20px; font-size: 0.9rem;
        }
        .preview-modal-content { max-width: 700px; }
        .preview-content { padding: 10px 0; }
        .preview-section { margin-bottom: 25px; }
        .preview-label {
            font-size: 0.85rem; color: #999; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 8px; font-weight: 600;
        }
        .preview-title {
            font-size: 1.5rem; color: #333; font-weight: 600;
            line-height: 1.4; padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 12px; border-left: 4px solid #667eea;
        }
        .preview-keywords {
            font-size: 1.1rem; color: #667eea; padding: 12px 15px;
            background: rgba(102,126,234,0.1); border-radius: 12px;
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .keyword-tag {
            display: inline-block; padding: 4px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border-radius: 15px; font-size: 0.9rem;
        }
        .preview-detail {
            font-size: 1.05rem; color: #444; line-height: 1.8;
            padding: 20px; background: #f8f9fa; border-radius: 12px;
            white-space: pre-wrap; word-wrap: break-word;
            max-height: 300px; overflow-y: auto;
        }
        .preview-meta {
            display: flex; gap: 20px; padding: 15px;
            background: #f0f0f0; border-radius: 10px;
            margin-top: 20px; font-size: 0.9rem; color: #666;
        }
        .preview-actions {
            display: flex; justify-content: flex-end;
            gap: 10px; margin-top: 20px; padding-top: 20px;
            border-top: 1px solid #eee;
        }
        @media (max-width: 768px) {
            header h1 { font-size: 1.8rem; }
            .cards-grid { grid-template-columns: 1fr; }
            .study-card { padding: 20px; min-height: 300px; }
            .study-actions { flex-direction: column; }
            .study-actions button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 艾宾浩斯记忆卡片</h1>
            <p>基于遗忘曲线的科学记忆工具</p>
        </header>

        <nav class="nav-tabs">
            <button class="nav-tab active" onclick="showSection('today')">📅 今日计划</button>
            <button class="nav-tab" onclick="showSection('cards')">📝 记忆卡片</button>
        </nav>

        <section id="today-section" class="section active">
            <div class="ebbinghaus-info">
                <h3>📚 艾宾浩斯遗忘曲线复习计划</h3>
                <p>根据艾宾浩斯遗忘曲线，记忆会在学习后快速遗忘。在特定时间点复习可以最大化记忆效果。</p>
                <div class="schedule-list">
                    <span class="schedule-item">第1天</span>
                    <span class="schedule-item">第2天</span>
                    <span class="schedule-item">第4天</span>
                    <span class="schedule-item">第7天</span>
                    <span class="schedule-item">第15天</span>
                    <span class="schedule-item">第30天</span>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button class="btn btn-primary" onclick="openModal()"><span>+</span> 添加新卡片</button>
            </div>
            <div id="today-content"></div>
        </section>

        <section id="cards-section" class="section">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                    <h2>📝 我的记忆卡片</h2>
                    <button class="btn btn-primary" onclick="openModal()"><span>+</span> 新建卡片</button>
                </div>
            </div>
            <div id="cards-list" class="cards-grid"></div>
        </section>
    </div>

    <div id="card-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">新建卡片</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="card-form" onsubmit="saveCard(event)">
                <input type="hidden" id="card-id">
                <div class="form-group" id="copy-from-group">
                    <label for="copy-from-select">📋 从已有卡片复制（可选）</label>
                    <select id="copy-from-select" onchange="copyFromExistingCard(this.value)">
                        <option value="">-- 选择已有卡片作为模板 --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="card-title">题目 *</label>
                    <input type="text" id="card-title" required placeholder="输入题目或问题">
                </div>
                <div class="form-group">
                    <label for="card-keywords">关键点</label>
                    <input type="text" id="card-keywords" placeholder="输入关键词或提示（用逗号分隔）">
                </div>
                <div class="form-group">
                    <label for="card-content">详细内容 *</label>
                    <textarea id="card-content" required placeholder="输入详细答案或内容"></textarea>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div id="preview-modal" class="modal">
        <div class="modal-content preview-modal-content">
            <div class="modal-header">
                <h2>📝 卡片详情</h2>
                <button class="close-btn" onclick="closePreviewModal()">&times;</button>
            </div>
            <div class="preview-content">
                <div class="preview-section">
                    <div class="preview-label">📌 题目</div>
                    <div class="preview-title" id="preview-title"></div>
                </div>
                <div class="preview-section">
                    <div class="preview-label">🔑 关键点</div>
                    <div class="preview-keywords" id="preview-keywords"></div>
                </div>
                <div class="preview-section">
                    <div class="preview-label">📖 详细内容</div>
                    <div class="preview-detail" id="preview-detail"></div>
                </div>
                <div class="preview-meta" id="preview-meta"></div>
            </div>
            <div class="preview-actions">
                <button class="btn btn-secondary" onclick="closePreviewModal()">关闭</button>
                <button class="btn btn-primary" id="preview-edit-btn">编辑</button>
            </div>
        </div>
    </div>

    <script>
        const EBBINGHAUS_INTERVALS = [1, 2, 4, 7, 15, 30];
        let cards = JSON.parse(localStorage.getItem('memoryCards')) || [];
        let studyProgress = JSON.parse(localStorage.getItem('studyProgress')) || {};

        function getTodayString() { return new Date().toISOString().split('T')[0]; }
        function addDays(date, days) {
            const result = new Date(date);
            result.setDate(result.getDate() + days);
            return result.toISOString().split('T')[0];
        }
        function getTodayCards() {
            const today = getTodayString();
            return cards.filter(card => {
                if (!card.createdAt) return false;
                for (const interval of EBBINGHAUS_INTERVALS) {
                    const reviewDate = addDays(card.createdAt, interval);
                    if (reviewDate === today) {
                        const progressKey = `${card.id}_${today}`;
                        if (!studyProgress[progressKey]) return true;
                    }
                }
                return false;
            });
        }
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            if (section === 'today') {
                document.getElementById('today-section').classList.add('active');
                document.querySelectorAll('.nav-tab')[0].classList.add('active');
                renderTodayPlan();
            } else {
                document.getElementById('cards-section').classList.add('active');
                document.querySelectorAll('.nav-tab')[1].classList.add('active');
                renderCardsList();
            }
        }
        function renderTodayPlan() {
            const todayCards = getTodayCards();
            const today = getTodayString();
            const container = document.getElementById('today-content');
            const totalCards = todayCards.length;
            const completedCards = todayCards.filter(card => {
                const progressKey = `${card.id}_${today}`;
                return studyProgress[progressKey] === 'remembered';
            }).length;
            const progressPercent = totalCards > 0 ? (completedCards / totalCards * 100) : 100;

            if (totalCards === 0) {
                container.innerHTML = `
                    <div class="completion-message">
                        <div style="font-size: 4rem; margin-bottom: 20px;">🎉</div>
                        <h2>今天没有需要复习的卡片！</h2>
                        <p>你已经完成了所有的记忆任务，或者还没有添加卡片。</p>
                        <button class="btn btn-primary" onclick="openModal()" style="margin-top: 20px;">去添加新卡片</button>
                    </div>`;
                return;
            }
            if (completedCards === totalCards) {
                container.innerHTML = `
                    <div class="completion-message">
                        <div style="font-size: 4rem; margin-bottom: 20px;">🎊</div>
                        <h2>恭喜！今日计划已完成！</h2>
                        <p>所有 ${totalCards} 张卡片都已记住，太棒了！</p>
                        <p style="margin-top: 20px; color: #999;">明天继续加油 💪</p>
                    </div>`;
                return;
            }
            const currentCard = todayCards.find(card => {
                const progressKey = `${card.id}_${today}`;
                return studyProgress[progressKey] !== 'remembered';
            });
            container.innerHTML = `
                <div class="plan-header">
                    <div><h3>今日复习进度</h3></div>
                    <div class="plan-stats">
                        <div class="stat-item"><div class="stat-value">${completedCards}</div><div class="stat-label">已完成</div></div>
                        <div class="stat-item"><div class="stat-value">${totalCards}</div><div class="stat-label">总卡片</div></div>
                    </div>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width: ${progressPercent}%"></div></div>
                <div class="study-card">
                    <div class="study-card-content">
                        <h2>${currentCard.title}</h2>
                        <div class="keywords">${currentCard.keywords || '无关键词'}</div>
                        <button class="btn btn-secondary reveal-btn" onclick="toggleDetail(this)">👆 点击查看答案</button>
                        <div class="detail" id="detail-content">${currentCard.content.replace(/\\n/g, '<br>')}</div>
                    </div>
                    <div class="study-actions">
                        <button class="btn btn-danger" onclick="markCard('${currentCard.id}', 'forgot')">❌ 没记住</button>
                        <button class="btn btn-success" onclick="markCard('${currentCard.id}', 'remembered')">✅ 记住了</button>
                    </div>
                </div>
                <div style="text-align: center; margin-top: 20px; color: #999;">剩余 ${totalCards - completedCards} 张卡片</div>`;
        }
        function toggleDetail(btn) {
            const detail = document.getElementById('detail-content');
            detail.classList.toggle('show');
            btn.textContent = detail.classList.contains('show') ? '👆 点击隐藏答案' : '👆 点击查看答案';
        }
        function markCard(cardId, status) {
            const today = getTodayString();
            const progressKey = `${cardId}_${today}`;
            studyProgress[progressKey] = status;
            localStorage.setItem('studyProgress', JSON.stringify(studyProgress));
            if (status === 'remembered') {
                setTimeout(() => renderTodayPlan(), 300);
            } else {
                const detail = document.getElementById('detail-content');
                const btn = document.querySelector('.reveal-btn');
                if (detail) detail.classList.remove('show');
                if (btn) btn.textContent = '👆 点击查看答案';
                alert('没关系，多复习几次就会记住的！');
            }
        }
        function getNextReviewDate(card) {
            if (!card.createdAt) return '未设置';
            const today = getTodayString();
            for (const interval of EBBINGHAUS_INTERVALS) {
                const reviewDate = addDays(card.createdAt, interval);
                const progressKey = `${card.id}_${reviewDate}`;
                if (reviewDate >= today && !studyProgress[progressKey]) {
                    return reviewDate === today ? '今天' : reviewDate;
                }
            }
            return '已完成所有复习';
        }
        function renderCardsList() {
            const container = document.getElementById('cards-list');
            if (cards.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">📝</div>
                        <h3>还没有记忆卡片</h3>
                        <p>点击上方按钮创建你的第一张记忆卡片</p>
                    </div>`;
                return;
            }
            container.innerHTML = cards.map(card => {
                const nextReview = getNextReviewDate(card);
                return `
                    <div class="memory-card" onclick="showCardDetail('${card.id}')">
                        <h3>${card.title}</h3>
                        <div class="keywords">${card.keywords || '无关键词'}</div>
                        <div class="next-review">📅 下次复习: ${nextReview}</div>
                        <div class="card-actions" onclick="event.stopPropagation()">
                            <button class="btn btn-secondary" onclick="editCard('${card.id}')">编辑</button>
                            <button class="btn btn-danger" onclick="deleteCard('${card.id}')">删除</button>
                        </div>
                    </div>`;
            }).join('');
        }
        function openModal() {
            document.getElementById('card-modal').classList.add('active');
            document.getElementById('modal-title').textContent = '新建卡片';
            document.getElementById('card-form').reset();
            document.getElementById('card-id').value = '';
            populateCopyFromSelect();
            document.getElementById('copy-from-group').style.display = 'block';
        }
        function populateCopyFromSelect() {
            const select = document.getElementById('copy-from-select');
            select.innerHTML = '<option value="">-- 选择已有卡片作为模板 --</option>';
            cards.forEach(card => {
                const option = document.createElement('option');
                option.value = card.id;
                option.textContent = card.title;
                select.appendChild(option);
            });
        }
        function copyFromExistingCard(cardId) {
            if (!cardId) return;
            const card = cards.find(c => c.id === cardId);
            if (!card) return;
            document.getElementById('card-title').value = card.title + ' (副本)';
            document.getElementById('card-keywords').value = card.keywords || '';
            document.getElementById('card-content').value = card.content;
            document.getElementById('copy-from-select').value = '';
        }
        function closeModal() { document.getElementById('card-modal').classList.remove('active'); }
        function saveCard(event) {
            event.preventDefault();
            const id = document.getElementById('card-id').value;
            const title = document.getElementById('card-title').value.trim();
            const keywords = document.getElementById('card-keywords').value.trim();
            const content = document.getElementById('card-content').value.trim();
            if (id) {
                const index = cards.findIndex(c => c.id === id);
                if (index !== -1) cards[index] = { ...cards[index], title, keywords, content };
            } else {
                cards.push({ id: Date.now().toString(), title, keywords, content, createdAt: getTodayString() });
            }
            localStorage.setItem('memoryCards', JSON.stringify(cards));
            closeModal();
            renderCardsList();
            renderTodayPlan();
        }
        function editCard(id) {
            const card = cards.find(c => c.id === id);
            if (!card) return;
            document.getElementById('card-id').value = card.id;
            document.getElementById('card-title').value = card.title;
            document.getElementById('card-keywords').value = card.keywords || '';
            document.getElementById('card-content').value = card.content;
            document.getElementById('modal-title').textContent = '编辑卡片';
            document.getElementById('card-modal').classList.add('active');
            document.getElementById('copy-from-group').style.display = 'none';
        }
        function deleteCard(id) {
            if (!confirm('确定要删除这张卡片吗？')) return;
            cards = cards.filter(c => c.id !== id);
            Object.keys(studyProgress).forEach(key => { if (key.startsWith(id + '_')) delete studyProgress[key]; });
            localStorage.setItem('memoryCards', JSON.stringify(cards));
            localStorage.setItem('studyProgress', JSON.stringify(studyProgress));
            renderCardsList();
        }
        function showCardDetail(id) {
            const card = cards.find(c => c.id === id);
            if (!card) return;
            document.getElementById('preview-title').textContent = card.title;
            const keywordsContainer = document.getElementById('preview-keywords');
            if (card.keywords) {
                const keywords = card.keywords.split(/[,，]/).map(k => k.trim()).filter(k => k);
                keywordsContainer.innerHTML = keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('') || '<span style="color: #999;">无关键词</span>';
            } else {
                keywordsContainer.innerHTML = '<span style="color: #999;">无关键词</span>';
            }
            document.getElementById('preview-detail').textContent = card.content;
            const nextReview = getNextReviewDate(card);
            document.getElementById('preview-meta').innerHTML = `
                <div class="preview-meta-item">📅 创建日期: ${card.createdAt || '未知'}</div>
                <div class="preview-meta-item">🔔 下次复习: ${nextReview}</div>`;
            document.getElementById('preview-edit-btn').onclick = function() { closePreviewModal(); editCard(card.id); };
            document.getElementById('preview-modal').classList.add('active');
        }
        function closePreviewModal() { document.getElementById('preview-modal').classList.remove('active'); }
        document.getElementById('card-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        document.getElementById('preview-modal').addEventListener('click', function(e) { if (e.target === this) closePreviewModal(); });
        renderTodayPlan();
    </script>
</body>
</html>
